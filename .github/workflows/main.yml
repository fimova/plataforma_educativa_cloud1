name: CI-CD Plataforma Educativa

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      USER_SERVER: ${{ secrets.USER_SERVER }}

      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission to Maven Wrapper
        run: chmod +x mvnw

      - name: Build application with Maven
        run: ./mvnw clean package -DskipTests

      - name: Login to Docker Hub
        run: echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${DOCKERHUB_USERNAME}/plataforma_educativa_api:latest .

      - name: Push Docker image
        run: docker push ${DOCKERHUB_USERNAME}/plataforma_educativa_api:latest

      - name: Create SSH private key
        run: |
          echo "${EC2_SSH_KEY}" > private_key.pem
          chmod 600 private_key.pem

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${USER_SERVER}@${EC2_HOST} "
      
            docker pull ${DOCKERHUB_USERNAME}/plataforma_educativa_api:latest &&
      
            docker stop plataforma-edu-api || true &&
            docker rm plataforma-edu-api || true &&
      
            docker run -d -p 8080:8080 \
              -v /home/ubuntu/wallet:/wallet \
              --name plataforma-edu-api \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              ${DOCKERHUB_USERNAME}/plataforma_educativa_api:latest &&
      
            docker ps &&
            docker logs plataforma-edu-api --tail 50
          "

          EOF
